<section class="lesson-section">
    <h2 data-i18n="ram_3d_model">3D модель оперативной памяти</h2>
    
    <div class="model-viewer-container">
        <div class="model-viewer">
            <div class="css-3d-scene">
                <div class="model-3d ram-3d">
                    <div class="ram-stick">
                        <div style="color: white; font-weight: 700; margin-bottom: 10px;">DDR4</div>
                        <div class="ram-chips">
                            <div class="ram-chip"></div>
                            <div class="ram-chip"></div>
                            <div class="ram-chip"></div>
                            <div class="ram-chip"></div>
                            <div class="ram-chip"></div>
                            <div class="ram-chip"></div>
                            <div class="ram-chip"></div>
                            <div class="ram-chip"></div>
                        </div>
                        <div class="ram-label">16 GB</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="model-controls">
            <button class="control-btn" data-action="rotate">⏸️ <span data-i18n="pause">Пауза</span></button>
            <button class="control-btn" data-action="reset">🔄 <span data-i18n="reset">Сбросить</span></button>
            <button class="control-btn" data-action="zoom-in">🔍+ <span data-i18n="zoom_in">Приблизить</span></button>
            <button class="control-btn" data-action="zoom-out">🔍- <span data-i18n="zoom_out">Отдалить</span></button>
        </div>
        
        <div class="model-info-panel">
            <h4 data-i18n="specifications">Технические характеристики</h4>
            <div class="model-specs">
                <div class="spec-item">
                    <span class="spec-label" data-i18n="capacity">Объём</span>
                    <span class="spec-value">16 GB</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label" data-i18n="type">Тип</span>
                    <span class="spec-value">DDR4</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label" data-i18n="frequency">Частота</span>
                    <span class="spec-value">3200 MHz</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label" data-i18n="latency">Задержка</span>
                    <span class="spec-value">CL16</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label" data-i18n="voltage">Напряжение</span>
                    <span class="spec-value">1.35V</span>
                </div>
            </div>
        </div>
    </div>
</section>
